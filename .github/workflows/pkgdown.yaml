on:
  push:
    branches: [main]
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies and documentation tools
        run: Rscript install-deps.R

      - name: Install the monorepo
        run: make install

      - name: Render README and package sites
        run: |
          make rdm
          make site

      - name: Build the landing page
        run: |
          pandoc README.md --standalone --from=gfm \
            --metadata title="Rho" \
            --output=_site/index.html

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
