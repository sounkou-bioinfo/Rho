on:
  push:
    branches: [main]
  workflow_dispatch:

name: pkgdown.yaml

permissions:
  contents: read

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies and documentation tools
        run: Rscript install-deps.R

      - name: Install the monorepo
        run: make install

      - name: Render README and package sites
        run: |
          make rdm
          make site

      - name: Build the landing page
        run: |
          pandoc README.md --standalone --from=gfm \
            --metadata title="Rho: async agents in modern R" \
            --output=_site/index.html

      - name: Upload private site artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkgdown-site
          path: _site
