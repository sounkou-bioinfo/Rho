on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  secrets:
    name: Repository history
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install Gitleaks 8.30.1
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" | sha256sum --check
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan repository history
        run: make check-secrets

  core:
    name: R ${{ matrix.r }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r: ['4.4', 'release']
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Install Air
        uses: posit-dev/setup-air@v1

      - name: Install dependencies
        run: Rscript install-deps.R

      - name: Verify generated tests and style contract
        run: |
          make check-version
          make check-publication
          make check-purled-tests
          make check-models
          make check-style

      - name: Install monorepo in dependency order
        run: make install

      - name: Verify generated documentation
        run: |
          make rd
          make rdm
          git diff --exit-code

      - name: Run test suites
        run: make test

      - name: Check every package
        run: make check
